<article class="project-card">
  <div class="project-card-header">
    <h3 class="project-card-name">{{ .name }}</h3>
    <span class="badge badge-{{ .status }}">{{ .status }}</span>
  </div>
  <p class="project-card-tagline">{{ .tagline }}</p>
  <div class="project-card-meta">
    {{ with .language }}<span class="tag">{{ . }}</span>{{ end }}
    {{ with .category }}<span class="tag">{{ . }}</span>{{ end }}
  </div>
  {{ with .install }}
    <div class="project-card-install" onclick="copyText(this, '{{ . }}')">
      {{ . }}
    </div>
  {{ end }}
  <div class="project-card-links">
    {{ with .url }}<a href="{{ . }}" target="_blank" rel="noopener noreferrer">Website ↗</a>{{ end }}
    {{ with .github }}<a href="{{ . }}" target="_blank" rel="noopener noreferrer">GitHub ↗</a>{{ end }}
  </div>
</article>
