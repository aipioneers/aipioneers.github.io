{{ define "main" }}
<div class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div>{{ . }}</div>{{ end }}
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="project-grid">
      {{ range sort .Site.Data.projects "sort_order" }}
        <div class="reveal">
          {{ partial "project-card.html" . }}
        </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
