{{ define "main" }}
<div class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}{{ . }}{{ end }}
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="project-grid">
      {{ range .Site.Data.projects }}
        {{ partial "project-card.html" . }}
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
